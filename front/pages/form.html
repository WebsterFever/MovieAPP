<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        crossorigin="anonymous" />

    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/from.css">

    <title>Create Movie</title>
</head>

<body class="bg-light">

    <header id="header">
        <div class="logo-container">
            <h1 class="logo"> 🎬
                <span>W</span><span>e</span><span>b</span><span>M</span><span>o</span><span>v</span><span>i</span><span>e</span>
            </h1>
        </div>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="history.html">Film History</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-image"></section>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header text-center text-white" style="background:#111;">
                        <h4>Create Movie</h4>
                    </div>

                    <div class="card-body">
                        <form class="form">

                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" class="form-control" id="title" required>
                            </div>

                            <div class="form-group">
                                <label>Year</label>
                                <input type="number" class="form-control" id="year" min="1900" max="2024" required>
                            </div>

                            <div class="form-group">
                                <label>Director</label>
                                <input type="text" class="form-control" id="director" required>
                            </div>

                            <div class="form-group">
                                <label>Duration</label>
                                <input type="text" class="form-control" id="duration" required>
                            </div>

                            <!-- GENRE GENERATED BY JS -->
                            <div class="form-group text-center">
                                <label class="d-block mb-3">Genre</label>

                                <div id="genreContainer"
                                    class="btn-group-toggle d-flex flex-wrap justify-content-center"
                                    data-toggle="buttons">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Rating</label>
                                <input type="number" class="form-control" id="rate" min="1" max="10" required>
                            </div>

                            <div class="form-group">
                                <label>Poster URL</label>
                                <input type="text" class="form-control" id="poster" required>
                            </div>

                            <button type="submit" class="btn btn-danger btn-block">
                                Create
                            </button>

                            <button type="button" id="clearBtn" class="btn btn-outline-light btn-block mt-2">
                                Clear
                            </button>

                        </form>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="../../public/bundle.js"></script>

</body>

</html>
