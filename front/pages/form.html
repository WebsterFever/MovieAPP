<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/reset.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

    <!-- Popper -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="../css/styles.css">

    <title>Create Movie</title>
</head>

<body class="bg-light">

    <header id="header">
        <div class="logo-container">
            <h1 class="logo"> 🎬 <span>W</span> <span>e</span> <span>b</span> <span>M</span> <span>o</span>
                <span>v</span> <span>i</span> <span>e</span>
            </h1>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="history.html">Film History</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero-image"></section>
    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Create Movie</h4>
                    </div>

                    <div class="card-body">
                        <form class="form">

                            <div class="form-group">
                                <label for="title">Title</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>

                            <div class="form-group">
                                <label for="year">Year</label>
                                <input type="number" class="form-control" id="year" name="year" min="1900" max="2024"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="director">Director</label>
                                <input type="text" class="form-control" id="director" name="director" required>
                            </div>

                            <div class="form-group">
                                <label for="duration">Duration</label>
                                <input type="text" class="form-control" id="duration" name="duration" required>
                            </div>

                            <div class="form-group">
                                <label class="genre-title">Genre</label>

                                <div class="genre-options">

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Action">
                                        <span>Action</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Adventure">
                                        <span>Adventure</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Comedy">
                                        <span>Comedy</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Drama">
                                        <span>Drama</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Fantasy">
                                        <span>Fantasy</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Horror">
                                        <span>Horror</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Mystery">
                                        <span>Mystery</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Thriller">
                                        <span>Thriller</span>
                                    </label>

                                    <label class="genre-item">
                                        <input type="checkbox" name="genre" value="Sci-Fi">
                                        <span>Sci-Fi</span>
                                    </label>

                                </div>
                            </div>

                            <div class="form-group">
                                <label for="rate">Rating</label>
                                <input type="number" class="form-control" id="rate" name="rate" min="1" max="10"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="poster">Poster URL</label>
                                <input type="text" class="form-control" id="poster" name="poster" required>
                            </div>
                            <button type="submit" class="btn custom-btn btn-block">Create</button>
                            <button type="button" id="clearBtn" class="btn btn-outline-light btn-block mt-2">
                                Clear
                            </button>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../../public/bundle.js"></script>

</body>

</html>
